services:
  - type: web
    name: cafe-fausse-web
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      npm --prefix frontend install
      npm --prefix frontend run build
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DB_AUTO_CREATE
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
